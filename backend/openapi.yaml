openapi: 3.1.0
info:
  title: Calorie Food API
  version: 0.1.0
  description: API contract v1 for Telegram AI calorie tracker MVP.
servers:
  - url: https://api.example.com
security:
  - bearerAuth: []
paths:
  /auth/telegram/verify:
    post:
      summary: Verify Telegram initData and create session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [initData]
              properties:
                initData:
                  type: string
      responses:
        "200":
          description: Session established
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/logout:
    post:
      summary: Revoke current access token and optional refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Logged out
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/logout-all:
    post:
      summary: Revoke all sessions for current user
      responses:
        "204":
          description: All sessions revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
  /profile:
    get:
      summary: Get profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    put:
      summary: Update profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "422":
          $ref: "#/components/responses/ValidationError"
  /goals:
    get:
      summary: Get active goals
      responses:
        "200":
          description: Active daily goals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyGoal"
    put:
      summary: Set goals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyGoalUpdate"
      responses:
        "200":
          description: Updated goals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyGoal"
        "422":
          $ref: "#/components/responses/ValidationError"
  /dashboard:
    get:
      summary: Daily dashboard summary
      parameters:
        - in: query
          name: date
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
  /meals:
    get:
      summary: Get meals by date
      parameters:
        - in: query
          name: date
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of meals
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Meal"
    post:
      summary: Create meal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealCreate"
      responses:
        "201":
          description: Meal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meal"
        "422":
          $ref: "#/components/responses/ValidationError"
  /meals/{mealId}:
    patch:
      summary: Update meal
      parameters:
        - $ref: "#/components/parameters/MealId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealUpdate"
      responses:
        "200":
          description: Meal updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meal"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete meal
      parameters:
        - $ref: "#/components/parameters/MealId"
      responses:
        "204":
          description: Meal deleted
        "404":
          $ref: "#/components/responses/NotFound"
  /scans:
    post:
      summary: Create scan job
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                description:
                  type: string
                  description: Optional text description of meal; can be used without image
      responses:
        "202":
          description: Scan job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanJob"
        "422":
          $ref: "#/components/responses/ValidationError"
  /scans/{scanId}/recalculate:
    post:
      summary: Recalculate scan result using user comment
      parameters:
        - $ref: "#/components/parameters/ScanId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanRecalculateRequest"
      responses:
        "200":
          description: Recalculated scan status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Scan is not ready
  /scans/{scanId}:
    get:
      summary: Get scan status and result
      parameters:
        - $ref: "#/components/parameters/ScanId"
      responses:
        "200":
          description: Scan status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /scans/{scanId}/confirm:
    post:
      summary: Confirm scan and create meal
      parameters:
        - $ref: "#/components/parameters/ScanId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanConfirmRequest"
      responses:
        "201":
          description: Meal created from scan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meal"
        "409":
          description: Scan not ready or already confirmed
  /scans/{scanId}/cancel:
    post:
      summary: Cancel running scan
      parameters:
        - $ref: "#/components/parameters/ScanId"
      responses:
        "200":
          description: Scan cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Scan cannot be cancelled
  /health/live:
    get:
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Service is alive
  /health/ready:
    get:
      summary: Readiness probe
      security: []
      responses:
        "200":
          description: Service is ready
  /metrics:
    get:
      summary: Prometheus metrics
      security: []
      responses:
        "200":
          description: Prometheus text format metrics
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    MealId:
      in: path
      name: mealId
      required: true
      schema:
        type: string
        format: uuid
    ScanId:
      in: path
      name: scanId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    AuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          nullable: true
    User:
      type: object
      required: [id, telegramUserId, firstName]
      properties:
        id:
          type: string
          format: uuid
        telegramUserId:
          type: string
        username:
          type: string
          nullable: true
        firstName:
          type: string
        lastName:
          type: string
          nullable: true
    Profile:
      type: object
      required: [timezone, level, currentXp, xpRequired, loggedDaysCount, loggedDays]
      properties:
        timezone:
          type: string
        language:
          type: string
          nullable: true
        level:
          type: integer
        currentXp:
          type: integer
        xpRequired:
          type: integer
        heightCm:
          type: integer
          nullable: true
        weightKg:
          type: number
          nullable: true
        goalType:
          type: string
          enum: [lose, maintain, gain]
          nullable: true
        loggedDaysCount:
          type: integer
        loggedDays:
          type: array
          items:
            $ref: "#/components/schemas/ProfileLoggedDay"
    ProfileUpdate:
      type: object
      properties:
        timezone:
          type: string
        language:
          type: string
        heightCm:
          type: integer
        weightKg:
          type: number
        goalType:
          type: string
          enum: [lose, maintain, gain]
    ProfileLoggedDay:
      type: object
      required: [date, status]
      properties:
        date:
          type: string
          format: date
        status:
          type: string
          enum: [green, red]
    DailyGoal:
      type: object
      required: [calories, proteinG, carbsG, fatG]
      properties:
        calories:
          type: integer
        proteinG:
          type: integer
        carbsG:
          type: integer
        fatG:
          type: integer
    DailyGoalUpdate:
      allOf:
        - $ref: "#/components/schemas/DailyGoal"
    MealItem:
      type: object
      required: [name, calories, proteinG, carbsG, fatG]
      properties:
        name:
          type: string
        grams:
          type: number
          nullable: true
        calories:
          type: integer
        proteinG:
          type: number
        carbsG:
          type: number
        fatG:
          type: number
        confidence:
          type: number
          nullable: true
    Meal:
      type: object
      required: [id, title, mealType, eatenAt, source, items]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        mealType:
          type: string
          enum: [breakfast, lunch, dinner, snack]
        eatenAt:
          type: string
          format: date-time
        source:
          type: string
          enum: [manual, ai]
        items:
          type: array
          items:
            $ref: "#/components/schemas/MealItem"
    MealCreate:
      type: object
      required: [title, mealType, eatenAt, items]
      properties:
        title:
          type: string
        mealType:
          type: string
          enum: [breakfast, lunch, dinner, snack]
        eatenAt:
          type: string
          format: date-time
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/MealItem"
    MealUpdate:
      type: object
      properties:
        title:
          type: string
        mealType:
          type: string
          enum: [breakfast, lunch, dinner, snack]
        eatenAt:
          type: string
          format: date-time
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/MealItem"
    DashboardResponse:
      type: object
      required: [date, totals, goals, recentMeals]
      properties:
        date:
          type: string
          format: date
        totals:
          $ref: "#/components/schemas/DailyGoal"
        goals:
          $ref: "#/components/schemas/DailyGoal"
        recentMeals:
          type: array
          items:
            $ref: "#/components/schemas/Meal"
    ScanJob:
      type: object
      required: [id, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, processing, succeeded, failed, cancelled]
        createdAt:
          type: string
          format: date-time
    ScanResult:
      type: object
      required: [dishName, calories, proteinG, carbsG, fatG, confidence]
      properties:
        dishName:
          type: string
        calories:
          type: integer
        proteinG:
          type: number
        carbsG:
          type: number
        fatG:
          type: number
        confidence:
          type: number
        alternatives:
          type: array
          items:
            type: string
    ScanStatusResponse:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, processing, succeeded, failed, cancelled]
        errorCode:
          type: string
          nullable: true
        result:
          allOf:
            - $ref: "#/components/schemas/ScanResult"
          nullable: true
    ScanConfirmRequest:
      type: object
      required: [title, mealType, eatenAt, items]
      properties:
        title:
          type: string
        mealType:
          type: string
          enum: [breakfast, lunch, dinner, snack]
        eatenAt:
          type: string
          format: date-time
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/MealItem"
    ScanRecalculateRequest:
      type: object
      required: [comment]
      properties:
        comment:
          type: string
